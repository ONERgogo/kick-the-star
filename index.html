<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>重组现场 — 你的音乐节，你说了算</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Noto+Sans+SC:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<!-- ====== ACT 1: THE HOOK ====== -->
<section id="act1">
  <div class="poster-bg"></div>
  <div class="festival-header">
    <div class="fest-name">PHANTOM FEST 2026</div>
    <div class="fest-sub">某某音乐节 · 官方阵容</div>
  </div>

  <div class="star-container" id="starContainer">
    <div class="star-silhouette">
      <div class="glow"></div>
      <div class="star-figure" id="starFigure">
        <div class="money-symbol">¥</div>
      </div>
    </div>
    <div class="star-label">
      <div class="name">天价出场费</div>
      <div class="cost-tag">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v12M8 10h8M8 14h8"/></svg>
        吞掉了整个预算 ¥1,000,000
      </div>
    </div>
  </div>

  <div class="lineup-ghosts">
    <span class="ghost-name">本地新锐</span>
    <span class="ghost-name">宝藏乐队</span>
    <span class="ghost-name">地下传奇</span>
    <span class="ghost-name">独立新声</span>
  </div>

  <button class="kick-btn" id="kickBtn" onclick="kickTheStar()">砍掉这笔钱</button>
</section>

<!-- Budget reveal overlay -->
<div class="budget-reveal" id="budgetReveal">
  <div class="amount">¥1,000,000</div>
  <div class="tagline">预算已释放<br>把钱花在那些真正属于现场的声音上</div>
  <button class="enter-btn" onclick="enterAct2()">开始组建你的阵容 →</button>
</div>

<!-- ====== ACT 2: THE BUILD ====== -->
<section id="act2">
  <div class="act2-header">
    <h1>选品池</h1>
    <p class="subtitle">你的现场，你来选</p>
  </div>

  <div class="budget-bar">
    <div class="budget-bar-inner">
      <div class="budget-top">
        <span class="budget-label">可用预算</span>
        <span class="budget-amount" id="budgetDisplay">¥1,000,000</span>
      </div>
      <div class="budget-track">
        <div class="budget-fill" id="budgetFill" style="width:100%"></div>
      </div>
      <div class="selected-count" id="selectedCount">已选 0 组</div>
    </div>
  </div>

  <div class="pool-section">
    <div class="section-label">· 宝藏现场 ·</div>
    <div class="artist-grid" id="artistGrid"></div>
  </div>

  <div class="confirm-bar" id="confirmBar">
    <button class="confirm-btn" onclick="generatePoster()">生成我的阵容海报</button>
  </div>
</section>

<!-- ====== ACT 3: POSTER + LOUNGE ====== -->
<section id="act3">
  <div class="poster-output" id="posterOutput">
    <div class="poster-card" id="posterCard">
      <div class="poster-top">
        <div class="poster-fest">PHANTOM FEST 2026</div>
        <div class="poster-title">我的理想阵容</div>
      </div>
      <div class="poster-lineup" id="posterLineup"></div>
      <div class="poster-footer">
        <div class="poster-total" id="posterTotal"></div>
        <div class="poster-tag">#重组现场 #你的音乐节你说了算</div>
      </div>
    </div>
    <div class="poster-actions">
      <button class="action-btn primary" onclick="savePoster()">保存海报</button>
      <button class="action-btn" onclick="enterLounge()">去灵感墙看看 →</button>
    </div>
  </div>

  <!-- The Lounge -->
  <div class="lounge" id="lounge">
    <div class="lounge-header">
      <h1>灵感墙</h1>
      <p>所有人的理想现场，在这里交汇</p>
    </div>
    <div class="lounge-wall" id="loungeWall"></div>
  </div>
</section>

<!-- Audio player (hidden) -->
<audio id="audioPlayer" preload="none"></audio>

<div style="position:fixed;bottom:8px;left:0;right:0;text-align:center;font-size:10px;color:rgba(0,0,0,0.2);letter-spacing:1px;pointer-events:none;">本页面为虚构创意互动，不针对任何真实艺人或音乐节品牌</div>

<script src="app.js"></script>
</body>
</html>
